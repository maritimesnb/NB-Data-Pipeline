name: Fetch Environment Canada Water Data 
 
on: 
  schedule: 
    - cron: '0 * * * *'   # Runs every hour at :00 
  workflow_dispatch:       # Allows manual trigger for testing 
 
jobs: 
  fetch-data: 
    runs-on: ubuntu-latest 
 
    steps: 
      - name: Checkout repository 
        uses: actions/checkout@v3 
 
      - name: Set up Python 
        uses: actions/setup-python@v4 
        with: 
          python-version: '3.11' 
 
      - name: Install dependencies 
        run: pip install requests 
 
      - name: Fetch water data from Environment Canada 
        run: python fetch_water.py 
 
      - name: Commit and push new data 
        run: | 
          git config --global user.name 'github-actions[bot]' 
          git config --global user.email 'github-actions[bot]@users.noreply.github.com' 
          git add data/raw/ 
          git diff --staged --quiet || git commit -m 'Auto: water data $(date -u +%Y-%m-%dT%H:%M:%SZ)' 
          git push 
