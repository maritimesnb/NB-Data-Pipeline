name: Fetch Environment Canada Water Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write        # ← this was missing — allows git push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← fixes Node.js warning

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4        # ← v3 → v4

      - name: Set up Python
        uses: actions/setup-python@v5   # ← v4 → v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch water data from Environment Canada
        run: python fetch_water.py

      - name: Commit and push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/
          git diff --staged --quiet || git commit -m "Auto: water data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
